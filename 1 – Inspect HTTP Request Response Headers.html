<!DOCTYPE html>
<html>
<body>
<h2>HTTP Headers Inspection</h2>
<button onclick="getData()">Send Request</button>
<p id="out"></p>

<script>
function getData(){
 fetch('https://jsonplaceholder.typicode.com/posts/1')
 .then(res=>{
   document.getElementById("out").innerHTML="Status: "+res.status;
   return res.json();
 })
 .then(data=>console.log(data));
}
</script>
</body>
</html>
